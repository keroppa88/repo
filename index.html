<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>202603 Analysis</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 10px; margin: 0; color: #333; }
        
        /* 題名（太字）のスタイル */
        #page-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; }

        /* 画像：先頭 */
        .image-container { text-align: center; margin-bottom: 15px; }
        img { max-width: 100%; height: auto; }

        /* 本文：画面端で折り返し */
        #text-content { 
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: break-all;
            background: #f6f8fa;
            padding: 15px;
            border: 1px solid #d0d7de;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="page-title"></div>

    <div class="image-container">
        <img src="202603.png" alt="202603">
    </div>

    <div id="text-content">読み込み中...</div>

    <script>
        const targetFile = '202603.txt';
        
        fetch(targetFile)
            .then(response => response.ok ? response.text() : 'ファイルが見つかりません')
            .then(data => {
                const lines = data.split('\n');
                let firstLine = lines[0];
                let restText = lines.slice(1).join('\n');

                // 最初の行が # で始まる場合、それを太字タイトルにする
                if (firstLine.startsWith('#')) {
                    document.getElementById('page-title').textContent = firstLine.replace('#', '').trim();
                    document.getElementById('text-content').textContent = restText;
                } else {
                    document.getElementById('page-title').textContent = '';
                    document.getElementById('text-content').textContent = data;
                }
            })
            .catch(() => {
                document.getElementById('text-content').textContent = 'エラーが発生しました';
            });
    </script>

</body>
</html>
