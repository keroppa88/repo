<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>202603レポート文章見本</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 10px; margin: 0; color: #333; }
        #page-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .image-container { text-align: center; margin-bottom: 15px; }
        img { max-width: 100%; height: auto; }

        /* preタグでスペースと改行を保持しつつ、画面端で折り返す設定 */
        #text-content { 
            white-space: pre-wrap;      /* スペースを維持しつつ折り返す */
            overflow-wrap: break-word;
            word-break: break-all;
            background: #f6f8fa;
            padding: 15px;
            border: 1px solid #d0d7de;
            font-size: 16px;
            font-family: inherit;      /* フォントをbodyと共通にする */
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="page-title"></div>

    <div class="image-container">
        <img src="202603.png" alt="202603">
    </div>

    <pre id="text-content">読み込み中...</pre>

    <script>
        const targetFile = '202603.txt';
        
        fetch(targetFile)
            .then(response => response.ok ? response.text() : 'ファイルが見つかりません')
            .then(data => {
                const lines = data.split(/\r?\n/);
                let firstLine = lines[0];

                if (firstLine.startsWith('#')) {
                    document.getElementById('page-title').textContent = firstLine.replace('#', '').trim();
                    // 2行目以降（本文）を表示。trimせずそのまま渡すことで先頭の空白を維持
                    document.getElementById('text-content').textContent = lines.slice(1).join('\n');
                } else {
                    document.getElementById('page-title').textContent = '';
                    document.getElementById('text-content').textContent = data;
                }
            })
            .catch(() => {
                document.getElementById('text-content').textContent = 'エラーが発生しました';
            });
    </script>

</body>
</html>
