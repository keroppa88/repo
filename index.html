<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レポート一覧</title>

<style>
body {
    font-family: sans-serif;
    line-height: 1.6;
    padding: 10px;
    margin: 0;
    color: #333;
}

.controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
}

label {
    font-size: 24px;
    font-weight: bold;
}

select {
    font-size: 24px;
    font-weight: bold;
    padding: 8px 14px;
}

.section {
    margin-bottom: 40px;
}

.page-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
}

.image-container {
    text-align: center;
    margin-bottom: 10px;
}

img {
    max-width: 100%;
    height: auto;
}

.text-content {
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-all;
    background: #f6f8fa;
    padding: 15px;
    border: 1px solid #d0d7de;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="controls">
    <label for="month-select">→</label>
    <select id="month-select">
        <option value="202603">2026/03</option>
        <option value="202602">2026/02</option>
        <option value="202601">2026/01</option>
        <option value="202512">2025/12</option>
        <option value="202511">2025/11</option>
        <option value="202510">2025/10</option>
        <option value="202509">2025/09</option>
        <option value="202508">2025/08</option>
        <option value="202507">2025/07</option>
    </select>
</div>

<div id="container"></div>

<script>
const container = document.getElementById('container');
const monthSelect = document.getElementById('month-select');

function renderReport(file) {
    container.innerHTML = '';

    const section = document.createElement('div');
    section.className = 'section';

    const title = document.createElement('div');
    title.className = 'page-title';
    title.textContent = file;
    section.appendChild(title);

    const imgContainer = document.createElement('div');
    imgContainer.className = 'image-container';

    const img = document.createElement('img');
    img.src = file + '.png';
    img.alt = file;

    imgContainer.appendChild(img);
    section.appendChild(imgContainer);

    const text = document.createElement('pre');
    text.className = 'text-content';
    text.textContent = '読み込み中...';
    section.appendChild(text);

    container.appendChild(section);

    fetch(file + '.txt')
        .then(res => res.ok ? res.text() : 'ファイルが見つかりません')
        .then(data => {
            const lines = data.split(/\r?\n/);
            const firstLine = lines[0];

            if (firstLine.startsWith('#')) {
                title.textContent = firstLine.replace('#', '').trim();
                text.textContent = lines.slice(1).join('\n');
            } else {
                text.textContent = data;
            }
        })
        .catch(() => {
            text.textContent = 'エラーが発生しました';
        });
}

monthSelect.addEventListener('change', (event) => {
    renderReport(event.target.value);
});

renderReport(monthSelect.value);
</script>

</body>
</html>
